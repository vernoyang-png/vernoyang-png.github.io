  /* ── 色彩變數：溫暖奶油 × 手感木質 ── */
  :root {
    --bg:          #FAF8F4;
    --surface:     #FFFFFF;
    --surface2:    #F5F2EC;
    --border:      #E2DDD5;
    --border-soft: #EDE9E2;
    --text:        #2C2416;
    --muted:       #7A6E60;
    --accent:      #C0622A;
    --accent-light:#FDF0E8;
    --accent-dark: #A04E1E;
    --accent2:     #4A7C59;
    --radius:      14px;
    --radius-sm:   8px;
    --shadow:      0 2px 8px rgba(80,50,20,.07), 0 1px 3px rgba(80,50,20,.05);
    --shadow-card: 0 4px 16px rgba(80,50,20,.09);
    --font:        'Noto Sans TC', system-ui, -apple-system, sans-serif;
    --font-mono:   ui-monospace, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1C1812; --surface: #252018; --surface2: #2E2820;
      --border: #3A3328; --border-soft: #322C24;
      --text: #F0EBE1; --muted: #9A8E7E;
      --accent: #E08050; --accent-light: #2A1C12; --accent-dark: #F0A070;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;

  .logo {

    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {

  .logo span { color: var(--accent); }
  
  nav { display: flex; gap: 12px; }
  nav a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; transition: color .2s; }
  nav a:hover { color: var(--accent); }

  /* ── Hero ── */

    padding: 60px 0 40px;
    text-align: center;
  }
  .hero-badge {
    display: inline-block;
    background: var(--accent-light);

    border-radius: 20px;

  /* ── AdSense Slots ── */

  input:focus, select:focus, textarea:focus {

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent);

    border-radius: var(--radius-sm);

  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1.5px solid var(--border); box-shadow: none; }
  .btn-ghost:hover { background: var(--border-soft); color: var(--text); }

  /* ── Results ── */
  .result-box {
    background: var(--accent-light);
    border: 1.5px solid rgba(192,98,42,.15);
    border-radius: var(--radius-sm);

  .result-row:last-child { border-bottom: none; }

  .result-val.big { font-size: 24px; }

  /* ── Picker Specific ── */
  .picker-area { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 20px; background: var(--surface2); min-height: 120px; margin-bottom: 20px; }
  .picker-tags { display: flex; flex-wrap: wrap; gap: 10px; }
  .picker-tag { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 14px; font-weight: 600; box-shadow: var(--shadow); }
  .picker-tag .del { cursor: pointer; color: var(--muted); font-size: 14px; }

  .preset-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .preset-chip { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all .15s; }

  .pick-result-item { background: #F0FDF4; border: 1.5px solid rgba(21,128,61,.2); border-radius: var(--radius-sm); padding: 12px 20px; display: flex; align-items: center; gap: 12px; }

    .tool-section { padding: 24px 20px; }
    .ads-wrapper { padding: 10px; min-height: 80px; }
  }
</style>

<script>
  /* ── 多選多邏輯 ── */
  let pickerItems = [];
  let pickCount = 1;
  const PRESETS = {
    yesno: ['是','否'],
    numbers10: Array.from({length:10},(_,i)=>String(i+1)),
    numbers100: Array.from({length:100},(_,i)=>String(i+1)),
  };

  function addPreset(key) {
    PRESETS[key].forEach(v => { if(!pickerItems.includes(v)) pickerItems.push(v); });
    renderPickerTags();
  }

  function addPickerItem() {
    const input = document.getElementById('picker-input');
    const val = input.value.trim();
    if (!val) return;
    if (!pickerItems.includes(val)) {
      pickerItems.push(val);
      renderPickerTags();
    }
    input.value = '';
  }

  function clearAllItems() { pickerItems = []; renderPickerTags(); document.getElementById('pick-results').innerHTML = ''; }

  function renderPickerTags() {
    const area = document.getElementById('picker-tags');
    const empty = document.getElementById('picker-empty');
    if (pickerItems.length === 0) { empty.style.display = 'block'; area.innerHTML = ''; return; }
    empty.style.display = 'none';
    area.innerHTML = pickerItems.map((item, i) => `<span class="picker-tag">${item}<span class="del" onclick="removePickerItem(${i})">✕</span></span>`).join('');
  }

  function removePickerItem(idx) { pickerItems.splice(idx, 1); renderPickerTags(); }

  function changePickCount(delta) { pickCount = Math.max(1, Math.min(20, pickCount + delta)); document.getElementById('pick-count-display').textContent = pickCount; }

  function doPick(noRepeat) {
    if (pickerItems.length === 0) { alert('請先加入選項！'); return; }
    const n = Math.min(pickCount, pickerItems.length);
    let pool = [...pickerItems];
    const results = [];
    for (let i = 0; i < n; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      results.push(pool[idx]);
      if (noRepeat) pool.splice(idx, 1);
    }
    const el = document.getElementById('pick-results');
    el.innerHTML = `<div class="result-box"><div style="font-size:13px;color:var(--muted);margin-bottom:12px">抽籤結果</div><div style="display:flex;flex-wrap:wrap;gap:10px">${results.map((r,i) => `<div class="pick-result-item"><span>🎯</span><div><span style="font-size:11px;display:block;color:var(--muted)">第 ${i+1} 名</span><span style="font-size:16px;font-weight:700;color:#15803D">${r}</span></div></div>`).join('')}</div></div>`;
  }

  /* ── 薪資試算邏輯 ── */
  function calcSalary() {
    const gross = parseFloat(document.getElementById('sal-gross').value);
    if (!gross) return;
    const labor = Math.round(gross * 0.024);
    const health = Math.round(gross * 0.015);
    const net = gross - labor - health;
    document.getElementById('salary-result').innerHTML = `<div class="result-box"><div class="result-row"><span class="result-key">稅前薪資</span><span class="result-val">NT$ ${gross.toLocaleString()}</span></div><div class="result-row"><span class="result-key">勞保自付</span><span class="result-val">- NT$ ${labor.toLocaleString()}</span></div><div class="result-row"><span class="result-key">健保自付</span><span class="result-val">- NT$ ${health.toLocaleString()}</span></div><div class="result-row"><span class="result-key">預估實領</span><span class="result-val big">NT$ ${net.toLocaleString()}</span></div></div>`;
  }
</script>

</body>
</html>
