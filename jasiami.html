  const s = state[meal];
  if (s.style === 'western') return [...FOOD_DB[meal].western, ...s.custom.western];
  return [...(FOOD_DB[meal].chinese[s.cat] || []), ...(s.custom[s.cat] || [])];
}

function renderMeal(meal) {
  const s = state[meal];
  const isChinese = s.style === 'chinese';
  const list = getCurrentList(meal);
  const container = document.getElementById(`${meal}-ui`);

  container.innerHTML = `
    <div class="style-tabs">
      <button class="style-tab ${isChinese?'active':''}" onclick="setStyle('${meal}','chinese')">🥢 中式</button>
      <button class="style-tab ${!isChinese?'active':''}" onclick="setStyle('${meal}','western')">🍴 西式</button>
    </div>

    ${isChinese ? `
    <div class="cat-tabs">
      <button class="cat-tab ${s.cat==='rice'?'active':''}" onclick="setCat('${meal}','rice')">🍚 飯類</button>
      <button class="cat-tab ${s.cat==='noodle'?'active':''}" onclick="setCat('${meal}','noodle')">🍜 麵類</button>
      <button class="cat-tab ${s.cat==='soup'?'active':''}" onclick="setCat('${meal}','soup')">🥘 湯品鍋物</button>
    </div>` : ''}

    <span class="section-label">美食清單 <span class="food-count">（共 ${list.length} 項）</span></span>
    <div class="food-list-area">
      <div class="food-tags">${list.map((f, i) => `<span class="food-tag">${f}</span>`).join('')}</div>
    </div>

    <div class="add-row">
      <input type="text" id="add-${meal}" placeholder="新增自訂食物..." onkeydown="if(event.key==='Enter')addCustom('${meal}')">
      <button class="btn btn-sm" onclick="addCustom('${meal}')">＋ 新增</button>
    </div>

    <div class="pick-controls">
      <span style="font-size:14px;font-weight:600">幫我選</span>
      <div class="count-ctrl">
        <button class="count-btn" onclick="changeCount('${meal}',-1)">－</button>
        <span class="count-num" id="cnt-${meal}">${s.pickCount}</span>
        <button class="count-btn" onclick="changeCount('${meal}',1)">＋</button>
      </div>
      <span style="font-size:14px;font-weight:600">個</span>
    </div>

    <button class="btn btn-big" onclick="pickMeal('${meal}')">🎲 幫我決定 ${MEAL_NAMES[meal]}！</button>
    <div id="result-${meal}"></div>
  `;
}

function setStyle(meal, style) { state[meal].style = style; renderMeal(meal); }
function setCat(meal, cat) { state[meal].cat = cat; renderMeal(meal); }
function changeCount(meal, delta) { state[meal].pickCount = Math.max(1, Math.min(3, state[meal].pickCount + delta)); document.getElementById(`cnt-${meal}`).textContent = state[meal].pickCount; }

function addCustom(meal) {
  const input = document.getElementById(`add-${meal}`);
  const val = input.value.trim();
  if (!val) return;
  const cat = state[meal].style === 'western' ? 'western' : state[meal].cat;
  state[meal].custom[cat].push(val);
  input.value = '';
  renderMeal(meal);
}

function pickMeal(meal) {
  const list = getCurrentList(meal);
  const n = Math.min(state[meal].pickCount, list.length);
  const picks = [...list].sort(() => Math.random() - 0.5).slice(0, n);
  
  let html = `<div class="result-wrapper"><div class="result-main">`;
  html += `<div class="result-label">🎉 ${MEAL_NAMES[meal]}就吃這個！</div>`;
  html += `<div class="result-food">${picks[0]}</div>`;
  if (n > 1) {
    html += `<div class="result-more">`;
    picks.slice(1).forEach((p, i) => html += `<div class="result-more-item">備選: ${p}</div>`);
    html += `</div>`;
  }
  html += `</div></div>`;
  document.getElementById(`result-${meal}`).innerHTML = html;
}

renderMeal('breakfast');
renderMeal('lunch');
renderMeal('dinner');
</script>

</body>
</html>
